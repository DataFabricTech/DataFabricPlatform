spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://{forProto}:5432/{forProto}
    platform: {forProto}
    username: {forProto}
    password: {forProto}
  jpa:
    hibernate:
      ddl-auto: update # When you launch the application for the first time - switch "none" at "create"
    show-sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    generate-ddl: true