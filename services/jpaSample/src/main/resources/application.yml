logging:
  level:
    root: "info"
    com:
      mobigen:
        ids: "info"

spring:
  application:
    name: jpa-agent
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: create-drop
